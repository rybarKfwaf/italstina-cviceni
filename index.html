<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>PARKOUR</title>
<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#7ec8ff; /* stejné na všech obrazovkách */
overflow:hidden;
color:white;
}

#title{
font-size:110px;
text-align:center;
margin-top:40px;
text-shadow:6px 6px #000;
font-weight:bold;
}

button{
font-size:26px;
padding:18px 40px;
margin:12px;
border-radius:16px;
border:4px solid rgba(0,0,0,.6);
cursor:pointer;
background:#ffd54f;
color:#000;
font-weight:bold;
box-shadow:4px 4px rgba(0,0,0,.4);
}

button:hover{filter:brightness(1.1)}

#menu,#levels,#settings,#shop,#raceMenu{
text-align:center;
margin-top:40px;
}

#coins{
position:absolute;
top:10px;
right:20px;
font-size:26px;
font-weight:bold;
color:#000;
background:#fff;
padding:8px 16px;
border-radius:12px;
border:3px solid #000;
}

#shopBtn{
position:absolute;
left:10px;
top:10px;
font-size:18px;
padding:12px 20px;
}

canvas{
border:6px solid black;
display:none;
margin:auto;
background:#87ceeb;
}

#levels,#settings,#shop,#raceMenu{display:none}

.lock{opacity:0.5}

#overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
background:rgba(0,0,0,.6);
align-items:center;
justify-content:center;
flex-direction:column;
}

#overlay h1{font-size:70px;margin:0}

#overlay button{font-size:30px}

.shopColor{
width:80px;
height:80px;
margin:10px;
border:4px solid #000;
cursor:pointer;
display:inline-block;
}

</style>
</head>

<body>

<div id="coins">Coins: 0</div>
<button id="shopBtn" onclick="openShop()">SHOP</button>

<div id="menu">
<div id="title">PARKOUR</div>
<button onclick="openLevels()">1 HRÁČ</button><br>
<button onclick="startRace()">2 HRÁČI</button><br>
<button onclick="openSettings()">NASTAVENÍ</button>
</div>

<div id="levels">
<h1>LEVELY</h1>
<button id="l1" onclick="startLevel(1)">LEVEL 1</button><br>
<button id="l2" onclick="startLevel(2)">🔒 LEVEL 2</button><br>
<button id="l3" onclick="startLevel(3)">🔒 LEVEL 3</button><br>
<button id="l4" onclick="startLevel(4)">🔒 LEVEL 4</button><br>
<button onclick="backMenu()">ZPĚT</button>
</div>

<div id="settings">
<h1>NASTAVENÍ</h1>
Hudba<br>
<input type="range" min="0" max="1" step="0.01" value="0.5"><br><br>
<button onclick="backMenu()">ZPĚT</button>
</div>

<div id="shop">
<h1>SHOP</h1>
<div id="skins"></div>
<br>
<button onclick="backMenu()">ZPĚT</button>
</div>

<div id="raceMenu">
<h1>ZÁVOD</h1>
<p>Dva hráči – kdo doběhne první!</p>
<button onclick="beginRace()">START</button><br>
<button onclick="backMenu()">ZPĚT</button>
</div>

<canvas id="game" width="1100" height="500"></canvas>

<div id="overlay">
<h1>LEVEL COMPLETE</h1>
<div style="margin-top:20px">
<button onclick="nextLevel()">DALŠÍ LEVEL</button>
<button onclick="backMenu()">MENU</button>
</div>
</div>

<script>

const canvas=document.getElementById("game")
const c=canvas.getContext("2d")

let coins=0
let unlocked=1
let currentLevel=1
let gameRunning=false

const player={
x:0,y:0,w:32,h:32,
vx:0,vy:0,
speed:4,
jump:-12,
color:"#000",
ground:false
}

const player2={
x:0,y:0,w:32,h:32,
vx:0,vy:0,
speed:4,
jump:-12,
color:"#ff0000",
ground:false
}

let platforms=[]
let hazards=[]
let finish=1000
let race=false

const keys={}

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true)
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false)

function updateCoins(){
document.getElementById("coins").innerText="Coins: "+coins
}

function backMenu(){
menu.style.display="block"
levels.style.display="none"
settings.style.display="none"
shop.style.display="none"
raceMenu.style.display="none"
canvas.style.display="none"
overlay.style.display="none"
gameRunning=false
race=false
}

function openLevels(){
menu.style.display="none"
levels.style.display="block"
updateLocks()
}

function openSettings(){
menu.style.display="none"
settings.style.display="block"
}

function openShop(){
menu.style.display="none"
shop.style.display="block"
}

function updateLocks(){
l2.innerText=unlocked>=2?"LEVEL 2":"🔒 LEVEL 2"
l3.innerText=unlocked>=3?"LEVEL 3":"🔒 LEVEL 3"
l4.innerText=unlocked>=4?"LEVEL 4":"🔒 LEVEL 4"
}

const skinColors=["red","blue","green","yellow","purple"]

const skinsDiv=document.getElementById("skins")
skinColors.forEach(color=>{
let div=document.createElement("div")
div.className="shopColor"
div.style.background=color
div.onclick=()=>buy(color)
skinsDiv.appendChild(div)
})

function buy(color){
if(coins>=100){
coins-=100
player.color=color
updateCoins()
}else{
alert("Nemáš dost coinů")
}
}

function startLevel(l){
if(l>unlocked)return
currentLevel=l
race=false
levels.style.display="none"
canvas.style.display="block"
canvas.style.background="#87ceeb"

setupLevel(l)

player.x=platforms[0].x+20
player.y=platforms[0].y-player.h
player.vy=0

gameRunning=true
}

function setupLevel(l){

platforms=[]
hazards=[]

if(l==1){

platforms=[
{x:40,y:380,w:200,h:20},
{x:320,y:340,w:140,h:20},
{x:520,y:300,w:140,h:20},
{x:720,y:260,w:140,h:20},
{x:940,y:240,w:120,h:20}
]

hazards=[{x:0,y:400,w:1100,h:200,color:"green"}]

}

if(l==2){

canvas.style.background="#ff9b4d"

platforms=[
{x:40,y:380,w:200,h:20},
{x:320,y:330,w:140,h:20},
{x:520,y:280,w:140,h:20},
{x:720,y:230,w:140,h:20},
{x:940,y:200,w:120,h:20}
]

hazards=[{x:0,y:400,w:1100,h:200,color:"#ff6a00"}]

}

if(l==3){

canvas.style.background="#ddd"

platforms=[
{x:100,y:380,w:80,h:20},
{x:250,y:350,w:140,h:20},
{x:450,y:320,w:80,h:20},
{x:650,y:290,w:200,h:20},
{x:900,y:260,w:150,h:20}
]

}

if(l==4){

canvas.style.background="#87ceeb"

platforms=[
{x:100,y:380,w:80,h:20},
{x:350,y:320,w:80,h:20},
{x:600,y:260,w:80,h:20},
{x:850,y:200,w:80,h:20},
{x:1050,y:150,w:80,h:20}
]

}

finish=1000

}

function startRace(){
menu.style.display="none"
raceMenu.style.display="block"
}

function beginRace(){

race=true
raceMenu.style.display="none"
canvas.style.display="block"

platforms=[]
hazards=[{x:0,y:400,w:2000,h:200,color:"green"}]

for(let i=0;i<20;i++){
platforms.push({x:50+i*100,y:350-Math.sin(i)*60,w:80,h:20})
}

finish=1900

player.x=60
player.y=300
player2.x=60
player2.y=260

gameRunning=true
}

function drawSky(){

c.fillStyle="yellow"
c.beginPath()
c.arc(1000,80,40,0,Math.PI*2)
c.fill()

for(let i=0;i<4;i++){
c.fillStyle="white"
c.fillRect(200+i*220,90,80,30)
c.fillRect(230+i*220,70,60,40)
}

}

function physics(p){
p.vy+=0.6
p.y+=p.vy

p.ground=false

platforms.forEach(pl=>{
if(p.x<p.w+pl.x &&
p.x+p.w>pl.x &&
p.y+p.h>pl.y &&
p.y+p.h<pl.y+20){
p.y=pl.y-p.h
p.vy=0
p.ground=true
}
})

hazards.forEach(h=>{
if(p.x<h.x+h.w &&
p.x+p.w>h.x &&
p.y<h.y+h.h &&
p.y+p.h>h.y){
p.x=platforms[0].x+20
p.y=platforms[0].y-40
p.vy=0
}
})
}

function loop(){

requestAnimationFrame(loop)

if(!gameRunning)return

c.clearRect(0,0,canvas.width,canvas.height)

drawSky()

platforms.forEach(p=>{
c.fillStyle="#8b5a2b"
c.fillRect(p.x,p.y,p.w,p.h)
})

hazards.forEach(h=>{
c.fillStyle=h.color
c.fillRect(h.x,h.y,h.w,h.h)
})

if(keys["a"])player.x-=player.speed
if(keys["d"])player.x+=player.speed
if(keys[" "]&&player.ground)player.vy=player.jump

physics(player)

c.fillStyle=player.color
c.fillRect(player.x,player.y,player.w,player.h)

if(race){

if(keys["arrowleft"])player2.x-=player2.speed
if(keys["arrowright"])player2.x+=player2.speed
if(keys["arrowup"]&&player2.ground)player2.vy=player2.jump

physics(player2)

c.fillStyle=player2.color
c.fillRect(player2.x,player2.y,player2.w,player2.h)

}

if(player.x>finish){

gameRunning=false
coins+=10
updateCoins()

if(unlocked<currentLevel+1)unlocked=currentLevel+1

overlay.style.display="flex"
}

}

function nextLevel(){

overlay.style.display="none"

if(currentLevel<4){
startLevel(currentLevel+1)
}else{
backMenu()
}

}

updateCoins()
loop()

</script>

</body>
</html>
